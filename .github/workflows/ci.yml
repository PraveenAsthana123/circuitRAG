name: CI

# NOTE: This workflow only uses `${{ env.* }}` constants defined in the file
# itself and matrix values — no untrusted inputs (issue titles, PR bodies,
# head_ref, commit messages) are interpolated into run: steps.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  GO_VERSION: "1.22"
  NODE_VERSION: "20"

jobs:

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install deps
        run: |
          pip install -U pip
          pip install ruff black mypy pycodestyle pip-audit bandit pytest pytest-asyncio pytest-cov
          pip install -e libs/py
      - name: Ruff (lint)
        run: ruff check libs/py services/ingestion-svc/app services/retrieval-svc/app services/inference-svc/app services/evaluation-svc/app scripts --output-format=concise
      - name: Black (format check)
        run: black --check libs/py services/ingestion-svc/app services/retrieval-svc/app services/inference-svc/app services/evaluation-svc/app
      - name: pycodestyle
        run: pycodestyle --max-line-length=120 libs/py services/ingestion-svc/app services/retrieval-svc/app services/inference-svc/app services/evaluation-svc/app
      - name: Mypy (non-blocking)
        run: mypy --ignore-missing-imports libs/py/documind_core || true
      - name: Bandit (security)
        run: bandit -r libs/py services/ingestion-svc/app services/retrieval-svc/app services/inference-svc/app services/evaluation-svc/app -ll
      - name: pip-audit (deps CVEs, non-blocking)
        run: pip-audit --strict -r services/ingestion-svc/requirements.txt -r services/retrieval-svc/requirements.txt -r services/inference-svc/requirements.txt -r services/evaluation-svc/requirements.txt || true
      - name: Pytest (unit)
        run: pytest -q libs/py/tests --cov=libs/py/documind_core --cov-report=term-missing

  go:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        svc: [api-gateway, identity-svc, governance-svc, finops-svc, observability-svc]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Tidy + vet + build + test
        working-directory: services/${{ matrix.svc }}
        run: |
          go mod tidy
          go vet ./...
          go build -v ./...
          go test -race -count=1 ./...

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json
      - name: Install + lint + build
        working-directory: services/frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          npm ci --no-audit --no-fund || npm install --no-audit --no-fund
          npm run lint || true
          npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [python, go, frontend]
    strategy:
      fail-fast: false
      matrix:
        svc: [ingestion-svc, retrieval-svc, inference-svc, evaluation-svc, api-gateway, identity-svc, governance-svc, finops-svc, observability-svc, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.svc }}/Dockerfile
          push: false
          tags: documind/${{ matrix.svc }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Kubeconform (K8s YAML validate)
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz
          ./kubeconform -strict -ignore-missing-schemas -summary infra/k8s/ || true
      - name: YAML lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: infra/k8s/ infra/istio/
          config_data: |
            extends: relaxed
            rules:
              line-length: disable
              truthy: disable
