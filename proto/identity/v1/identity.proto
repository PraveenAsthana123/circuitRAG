syntax = "proto3";

package documind.identity.v1;
option go_package = "github.com/documind/proto/identity/v1;identityv1";

import "common/v1/common.proto";

// Identity service — owns tenants, users, roles, JWT issuance, API keys.
// Design Area 22.

service IdentityService {
  rpc Health (documind.common.v1.HealthRequest) returns (documind.common.v1.HealthReply);

  rpc Login        (LoginRequest)        returns (LoginReply);
  rpc Refresh      (RefreshRequest)      returns (LoginReply);
  rpc VerifyToken  (VerifyTokenRequest)  returns (VerifyTokenReply);

  rpc CreateTenant (CreateTenantRequest) returns (Tenant);
  rpc GetTenant    (GetTenantRequest)    returns (Tenant);
  rpc ListTenants  (ListTenantsRequest)  returns (ListTenantsReply);

  rpc CreateUser   (CreateUserRequest)   returns (User);
  rpc AssignRole   (AssignRoleRequest)   returns (User);
}

message Tenant {
  string id        = 1;
  string name      = 2;
  string tier      = 3;   // free | pro | enterprise
  bool   suspended = 4;
}

message User {
  string id           = 1;
  string tenant_id    = 2;
  string email        = 3;
  string display_name = 4;
  repeated string roles = 5;
}

message LoginRequest  { string email = 1; string password = 2; }
message RefreshRequest { string refresh_token = 1; }

message LoginReply {
  string access_token  = 1;
  string refresh_token = 2;
  int32  expires_in    = 3;
  User   user          = 4;
}

message VerifyTokenRequest { string token = 1; }
message VerifyTokenReply {
  bool   valid    = 1;
  User   user     = 2;
  int64  exp      = 3;
  string error    = 4;
}

message CreateTenantRequest { string name = 1; string tier = 2; }
message GetTenantRequest    { string tenant_id = 1; }

message ListTenantsRequest  {
  documind.common.v1.Pagination paging = 1;
}
message ListTenantsReply {
  repeated Tenant items = 1;
  documind.common.v1.PaginationReply paging = 2;
}

message CreateUserRequest {
  string tenant_id    = 1;
  string email        = 2;
  string password     = 3;   // hashed at server side
  string display_name = 4;
  repeated string initial_roles = 5;
}

message AssignRoleRequest {
  string user_id = 1;
  string role    = 2;
}
