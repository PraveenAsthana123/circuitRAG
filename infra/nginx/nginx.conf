# ============================================================================
# DocuMind — NGINX edge layer (LB + static/CDN-edge cache + rate limit + TLS)
# ============================================================================
# Sits in front of the Go API gateway.
#
# Responsibilities (layer L7 but in front of the app layer):
#   1. TLS termination (self-signed in dev, LetsEncrypt in prod).
#   2. Static-asset caching for the Next.js frontend (acts as a CDN edge
#      node when a real CDN is absent).
#   3. Rate limiting (IP + path buckets) — a DDoS shield cheaper than the
#      application layer.
#   4. Request-body cap (rejects > 50MB uploads at the edge).
#   5. Upstream load balancing if you scale the Go gateway horizontally
#      (the `upstream gateway` block round-robins across replicas).
#
# Dev is a single origin; prod can add `server gateway-2:8080;` etc.
# ============================================================================

worker_processes  auto;
worker_rlimit_nofile 65535;

events {
    worker_connections  4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;

    # -- Logging ------------------------------------------------------------
    log_format json_combined escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"correlation_id":"$sent_http_x_correlation_id",'
        '"user_agent":"$http_user_agent",'
        '"x_forwarded_for":"$http_x_forwarded_for"'
    '}';
    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # -- Rate limit zones --------------------------------------------------
    # IP-level: 30 rps with 50-burst — cheap DDoS shield (the app layer
    # does per-tenant sliding-window on top).
    limit_req_zone $binary_remote_addr zone=ip_limit:10m rate=30r/s;
    # Upload bucket: tighter since uploads are expensive.
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/s;
    limit_req_status 429;

    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # -- Caching (static/CDN-edge) -----------------------------------------
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=static_cache:64m max_size=1g inactive=7d use_temp_path=off;
    proxy_cache_key $scheme$proxy_host$request_uri;

    # -- General perf ------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    client_max_body_size 50M;
    client_body_timeout  60s;
    client_header_timeout 10s;
    send_timeout         30s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/json application/javascript text/css text/plain application/xml;

    # -- Upstreams ---------------------------------------------------------
    # api-gateway is the Go service; scale by adding more server entries.
    upstream gateway {
        least_conn;
        server host.docker.internal:8080 max_fails=3 fail_timeout=10s;
        # server gateway-2:8080 max_fails=3 fail_timeout=10s;
        keepalive 64;
    }

    # Next.js static (when running the frontend dev server or a built bundle)
    upstream frontend {
        server host.docker.internal:3000 max_fails=3 fail_timeout=10s;
        keepalive 64;
    }

    # -- HTTP -> HTTPS redirect -------------------------------------------
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Health check allowed over plain HTTP
        location = /healthz { return 200 "ok\n"; }

        return 301 https://$host$request_uri;
    }

    # -- HTTPS main server -------------------------------------------------
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name _;

        # Dev self-signed cert; prod replaces with /etc/letsencrypt/live/...
        ssl_certificate     /etc/nginx/tls/server.crt;
        ssl_certificate_key /etc/nginx/tls/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_prefer_server_ciphers on;

        # Security headers at the edge too (defense in depth)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Connection-count cap per IP
        limit_conn conn_limit 30;

        # ---- Frontend (Next.js) ----
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 60s;
        }

        # ---- CDN-edge cache for Next.js static assets ----
        location ~* ^/_next/static/ {
            proxy_pass http://frontend;
            proxy_cache static_cache;
            proxy_cache_valid 200 301 302 7d;
            proxy_cache_lock on;
            proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;
            add_header X-Cache-Status $upstream_cache_status always;
            expires 7d;
            access_log off;
        }

        # ---- File uploads: tight rate limit + no cache ----
        location ~* /api/v1/documents/upload$ {
            limit_req zone=upload_limit burst=5 nodelay;
            client_max_body_size 50M;
            proxy_request_buffering off;   # stream to upstream
            proxy_pass http://gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300s;
        }

        # ---- API: general rate limit + proxy to Go gateway ----
        location /api/ {
            limit_req zone=ip_limit burst=50 nodelay;
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_read_timeout 120s;
            proxy_intercept_errors off;
        }

        # ---- Health + metrics (no rate limit, internal-only in prod) ----
        location = /healthz {
            access_log off;
            proxy_pass http://gateway;
        }
    }
}
