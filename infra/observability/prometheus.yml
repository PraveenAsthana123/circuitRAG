# ============================================================================
# Prometheus — scrape targets for the DocuMind local dev stack
# ============================================================================
# Every service exposes /metrics on its HTTP port. The OTel collector also
# exposes Prometheus-format metrics on :9464.
# ============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: documind-local

scrape_configs:
  # OTel collector (re-exports OTLP metrics received from services)
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:9464"]

  # Application services (if /metrics endpoints are enabled)
  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: identity-svc
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8081"]

  - job_name: ingestion-svc
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8082"]

  - job_name: retrieval-svc
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8083"]

  - job_name: inference-svc
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8084"]

  - job_name: evaluation-svc
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8085"]

  - job_name: governance-svc
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8086"]

  - job_name: finops-svc
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8087"]

  - job_name: observability-svc
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8088"]
