---
# Redis (cache, rate-limit, session)
apiVersion: apps/v1
kind: Deployment
metadata: { name: redis, namespace: documind-data }
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          args: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
          ports: [{ name: redis, containerPort: 6379 }]
          resources: { requests: { cpu: "100m", memory: "128Mi" }, limits: { cpu: "1", memory: "1Gi" } }
---
apiVersion: v1
kind: Service
metadata: { name: redis, namespace: documind-data }
spec:
  selector: { app: redis }
  ports: [{ name: redis, port: 6379, targetPort: redis }]
---
# Neo4j (graph)
apiVersion: apps/v1
kind: StatefulSet
metadata: { name: neo4j, namespace: documind-data }
spec:
  serviceName: neo4j
  replicas: 1
  selector: { matchLabels: { app: neo4j } }
  template:
    metadata: { labels: { app: neo4j } }
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.21-community
          env:
            - { name: NEO4J_AUTH, value: "neo4j/documind" }
            - { name: NEO4J_server_config_strict__validation_enabled, value: "false" }
          ports:
            - { name: http, containerPort: 7474 }
            - { name: bolt, containerPort: 7687 }
          volumeMounts: [{ name: data, mountPath: /data }]
          resources: { requests: { cpu: "250m", memory: "1Gi" }, limits: { cpu: "2", memory: "2Gi" } }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 20Gi } } }
---
apiVersion: v1
kind: Service
metadata: { name: neo4j, namespace: documind-data }
spec:
  selector: { app: neo4j }
  ports:
    - { name: http, port: 7474, targetPort: http }
    - { name: bolt, port: 7687, targetPort: bolt }
---
# Kafka (event backbone). For production, use Strimzi operator.
apiVersion: apps/v1
kind: StatefulSet
metadata: { name: kafka, namespace: documind-data }
spec:
  serviceName: kafka
  replicas: 3
  selector: { matchLabels: { app: kafka } }
  template:
    metadata: { labels: { app: kafka } }
    spec:
      containers:
        - name: kafka
          image: bitnami/kafka:3.8
          env:
            - { name: KAFKA_CFG_NODE_ID, valueFrom: { fieldRef: { fieldPath: metadata.name } } }
            - { name: KAFKA_CFG_PROCESS_ROLES, value: "controller,broker" }
            - { name: KAFKA_CFG_LISTENERS, value: "PLAINTEXT://:9092,CONTROLLER://:9093" }
            - { name: KAFKA_CFG_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka.documind-data.svc.cluster.local:9092" }
            - { name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT" }
            - { name: ALLOW_PLAINTEXT_LISTENER, value: "yes" }
          ports: [{ name: kafka, containerPort: 9092 }]
          volumeMounts: [{ name: data, mountPath: /bitnami/kafka }]
          resources: { requests: { cpu: "250m", memory: "512Mi" }, limits: { cpu: "2", memory: "2Gi" } }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 50Gi } } }
---
apiVersion: v1
kind: Service
metadata: { name: kafka, namespace: documind-data }
spec:
  selector: { app: kafka }
  ports: [{ name: kafka, port: 9092, targetPort: kafka }]
