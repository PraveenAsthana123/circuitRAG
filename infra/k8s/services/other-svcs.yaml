# ============================================================================
# frontend (Next.js)
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata: { name: frontend, namespace: documind, labels: { app: frontend, tier: edge } }
spec:
  replicas: 2
  selector: { matchLabels: { app: frontend } }
  template:
    metadata: { labels: { app: frontend } }
    spec:
      serviceAccountName: frontend
      containers:
        - name: frontend
          image: documind/frontend:latest
          ports: [{ name: http, containerPort: 3000 }]
          env:
            - { name: NEXT_PUBLIC_API_BASE_URL, value: "https://documind.local" }
          resources: { requests: { cpu: "100m", memory: "128Mi" }, limits: { cpu: "1", memory: "512Mi" } }
---
apiVersion: v1
kind: Service
metadata: { name: frontend, namespace: documind }
spec:
  selector: { app: frontend }
  ports: [{ name: http, port: 3000, targetPort: http }]
