---
# Remaining services — same shape, shorter because they're smaller.
# Each has: Deployment + Service + HPA. NetworkPolicies live per-svc too
# but for brevity are condensed into the namespace-default egress policy
# at infra/k8s/base/03-netpol-default.yaml.

# ============================================================================
# identity-svc
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata: { name: identity-svc, namespace: documind, labels: { app: identity-svc, tier: control-plane } }
spec:
  replicas: 2
  selector: { matchLabels: { app: identity-svc } }
  template:
    metadata: { labels: { app: identity-svc, version: stable } }
    spec:
      serviceAccountName: identity-svc
      containers:
        - name: identity
          image: documind/identity-svc:latest
          ports: [{ name: http, containerPort: 8081 }, { name: grpc, containerPort: 9091 }]
          envFrom:
            - configMapRef: { name: documind-config }
            - secretRef:    { name: documind-secrets }
          resources: { requests: { cpu: "100m", memory: "128Mi" }, limits: { cpu: "500m", memory: "512Mi" } }
          readinessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 5 }
---
apiVersion: v1
kind: Service
metadata: { name: identity-svc, namespace: documind }
spec:
  selector: { app: identity-svc }
  ports:
    - { name: http, port: 8081, targetPort: http }
    - { name: grpc, port: 9091, targetPort: grpc }
---
# ============================================================================
# evaluation-svc
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata: { name: evaluation-svc, namespace: documind, labels: { app: evaluation-svc, tier: data-plane } }
spec:
  replicas: 1
  selector: { matchLabels: { app: evaluation-svc } }
  template:
    metadata: { labels: { app: evaluation-svc, version: stable } }
    spec:
      serviceAccountName: evaluation-svc
      containers:
        - name: evaluation
          image: documind/evaluation-svc:latest
          ports: [{ name: http, containerPort: 8085 }]
          envFrom:
            - configMapRef: { name: documind-config }
            - secretRef:    { name: documind-secrets }
          resources: { requests: { cpu: "200m", memory: "512Mi" }, limits: { cpu: "1", memory: "1Gi" } }
---
apiVersion: v1
kind: Service
metadata: { name: evaluation-svc, namespace: documind }
spec:
  selector: { app: evaluation-svc }
  ports: [{ name: http, port: 8085, targetPort: http }]
---
