---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-svc
  namespace: documind
  labels: { app: inference-svc, tier: data-plane }
spec:
  replicas: 3
  strategy: { rollingUpdate: { maxUnavailable: 0, maxSurge: 1 } }
  selector: { matchLabels: { app: inference-svc } }
  template:
    metadata:
      labels: { app: inference-svc, version: stable }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8084"
    spec:
      serviceAccountName: inference-svc
      securityContext: { runAsNonRoot: true, runAsUser: 10001 }
      containers:
        - name: inference
          image: documind/inference-svc:latest
          ports: [{ name: http, containerPort: 8084 }, { name: grpc, containerPort: 9094 }]
          envFrom:
            - configMapRef: { name: documind-config }
            - secretRef:    { name: documind-secrets }
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "2Gi" }
          readinessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 5 }
          livenessProbe:  { httpGet: { path: /health, port: http }, periodSeconds: 15 }
---
apiVersion: v1
kind: Service
metadata: { name: inference-svc, namespace: documind }
spec:
  selector: { app: inference-svc }
  ports:
    - { name: http, port: 8084, targetPort: http }
    - { name: grpc, port: 9094, targetPort: grpc }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: inference-svc-hpa, namespace: documind }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: inference-svc }
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 65 } }
    # Scale on in-flight LLM requests (custom metric exposed by the service)
    - type: Pods
      pods:
        metric: { name: inference_inflight }
        target: { type: AverageValue, averageValue: "8" }
