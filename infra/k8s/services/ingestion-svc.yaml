---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-svc
  namespace: documind
  labels: { app: ingestion-svc, tier: data-plane }
spec:
  replicas: 2
  strategy: { rollingUpdate: { maxUnavailable: 0, maxSurge: 1 } }
  selector: { matchLabels: { app: ingestion-svc } }
  template:
    metadata:
      labels: { app: ingestion-svc, version: stable }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8082"
    spec:
      serviceAccountName: ingestion-svc
      securityContext: { runAsNonRoot: true, runAsUser: 10001, fsGroup: 10001 }
      containers:
        - name: ingestion
          image: documind/ingestion-svc:latest
          ports: [{ name: http, containerPort: 8082 }]
          envFrom:
            - configMapRef: { name: documind-config }
            - secretRef:    { name: documind-secrets }
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "2",    memory: "2Gi" }
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5, periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 30, periodSeconds: 15
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: Service
metadata: { name: ingestion-svc, namespace: documind, labels: { app: ingestion-svc } }
spec:
  selector: { app: ingestion-svc }
  ports: [{ name: http, port: 8082, targetPort: http }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: ingestion-svc-hpa, namespace: documind }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: ingestion-svc }
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: ingestion-svc-egress, namespace: documind }
spec:
  podSelector: { matchLabels: { app: ingestion-svc } }
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector: { matchLabels: { name: documind-data } }
    - to: []
      ports:
        - { port: 53, protocol: UDP }
        - { port: 53, protocol: TCP }
